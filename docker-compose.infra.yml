# Docker Compose for FinWise — Infrastructure Only
#
# Use when running FinWise MCP Server locally via dotnet run.
# Usage: docker compose -f docker-compose.infra.yml up -d

name: finwise

services:
  finwise-cosmosdb-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: finwise-cosmosdb-emulator
    ports:
      - "8081:8081" # NoSQL API endpoint
      - "8080:8080" # Health probe (/alive, /ready, /status)
    environment:
      - PROTOCOL=https
    volumes:
      - cosmosdb-data:/data
    mem_limit: 1g
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  finwise-redis:
    image: redis:7.4-alpine
    container_name: finwise-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 200mb --maxmemory-policy volatile-lru
    volumes:
      - redis-data:/data
    mem_limit: 256m
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  cosmosdb-data:
    driver: local
  redis-data:
    driver: local
