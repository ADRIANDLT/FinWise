# Docker Compose for FinWise — Full Stack
#
# Full stack:           docker compose up -d
# Infrastructure only:  docker compose -f docker-compose.infra.yml up -d
#
# Includes infrastructure (CosmosDB + Redis) and adds FinWise MCP Server.
#
# IMPORTANT: "name: finwise" must match docker-compose.infra.yml so both files
# share the same Docker volumes. Without this, the full-stack compose uses the
# directory name as project prefix, creating separate volumes and losing data
# written via the infra-only compose (or vice versa).

name: finwise

include:
  - docker-compose.infra.yml

services:
  finwise-mcp-server:
    build:
      context: .
      dockerfile: src/FinWise.McpServer/Dockerfile
    image: finwise-mcp-server:0.3.1
    container_name: finwise-mcp-server
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      # Azure OpenAI (required — from .env file)
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      # Stock Agent (optional — from .env file)
      - STOCK_AGENT_PROJECT_ENDPOINT=${STOCK_AGENT_PROJECT_ENDPOINT:-}
      - STOCK_AGENT_NAME=${STOCK_AGENT_NAME:-}
      - FINWISE_AZURE_TENANT_ID=${FINWISE_AZURE_TENANT_ID:-}
      - FINWISE_AZURE_CLIENT_ID=${FINWISE_AZURE_CLIENT_ID:-}
      - FINWISE_AZURE_CLIENT_SECRET=${FINWISE_AZURE_CLIENT_SECRET:-}
    depends_on:
      finwise-redis:
        condition: service_healthy
      finwise-cosmosdb-emulator:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -o /dev/null http://localhost:5000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 512m

# Usage:
#   Full stack:           docker compose up -d
#   Infrastructure only:  docker compose -f docker-compose.infra.yml up -d
#   Stop:                 docker compose down
#   Logs:                 docker compose logs -f
#   Status:               docker compose ps
