# Docker Compose for FinWise infrastructure (dev)
# - Azure CosmosDB Emulator (Linux) for user profiles
# - Redis for agent session persistence

services:
  cosmosdb-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmosdb-emulator
    hostname: cosmosdb-emulator
    ports:
      - "8081:8081" # NoSQL API endpoint
      - "10250:10250" # Compute emulator
      - "10251:10251" # Compute emulator
      - "10252:10252" # Compute emulator
      - "10253:10253" # Compute emulator
      - "10254:10254" # Compute emulator
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=127.0.0.1
    volumes:
      - cosmosdb-data:/tmp/cosmos/appdata
    mem_limit: 3g
    cpu_count: 2
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -k https://localhost:8081/_explorer/emulator.pem || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7.4-alpine
    container_name: finwise-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    mem_limit: 256m
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  cosmosdb-data:
    driver: local
  redis-data:
    driver: local

# Usage:
#   Start all:   docker compose up -d
#   Start Redis only: docker compose up -d redis
#   Stop:    docker compose down
#   Logs:    docker compose logs -f redis
#   Status:  docker compose ps
#
# Redis Connection Details:
#   Host: localhost
#   Port: 6379
#   Connection String: localhost:6379
#
# CosmosDB Connection Details:
#   Endpoint: https://localhost:8081/
#   Key: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
#
# Data Explorer: https://localhost:8081/_explorer/index.html
#
# Redis CLI:
#   docker exec -it finwise-redis redis-cli
#   > KEYS *              (list all keys)
#   > GET key             (get value)
#   > TTL key             (check TTL in seconds)
#   > DBSIZE              (count keys)
#   > FLUSHDB             (clear all keys)
