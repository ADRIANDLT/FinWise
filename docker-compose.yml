# Docker Compose for Azure CosmosDB Emulator (Linux)
# Documentation: https://learn.microsoft.com/en-us/azure/cosmos-db/how-to-develop-emulator

services:
  cosmosdb-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmosdb-emulator
    hostname: cosmosdb-emulator
    ports:
      - "8081:8081" # NoSQL API endpoint
      - "10250:10250" # Compute emulator
      - "10251:10251" # Compute emulator
      - "10252:10252" # Compute emulator
      - "10253:10253" # Compute emulator
      - "10254:10254" # Compute emulator
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=127.0.0.1
    volumes:
      - cosmosdb-data:/tmp/cosmos/appdata
    mem_limit: 3g
    cpu_count: 2
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -k https://localhost:8081/_explorer/emulator.pem || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  cosmosdb-data:
    driver: local

# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f cosmosdb-emulator
#   Status:  docker compose ps
#
# Connection Details:
#   Endpoint: https://localhost:8081/
#   Key: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
#
# Data Explorer: https://localhost:8081/_explorer/index.html
#
# Note: The emulator uses a self-signed certificate. The .NET SDK must be
# configured to accept it (see CosmosDbUserProfileStore configuration).
