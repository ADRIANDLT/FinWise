# Docker Compose for FinWise — Full Local Stack
#
# Full stack (local infra + server):  docker compose up -d
# Infrastructure only:                docker compose -f docker-compose.infra.yml up -d
# Server only (Azure DBs):            docker compose -f docker-compose.finwise.yml --env-file .env --env-file .env.azure up -d
#
# Includes local infrastructure (CosmosDB emulator + Redis) and FinWise MCP Server.
# The server definition lives in docker-compose.finwise.yml (single source of truth).
# This file merges it and adds depends_on so the server waits for local infra.
#
# IMPORTANT: "name: finwise" must match docker-compose.infra.yml so both files
# share the same Docker volumes. Without this, the full-stack compose uses the
# directory name as project prefix, creating separate volumes and losing data
# written via the infra-only compose (or vice versa).

name: finwise

include:
  - docker-compose.infra.yml

services:
  finwise-mcp-server:
    extends:
      file: docker-compose.finwise.yml
      service: finwise-mcp-server
    depends_on:
      finwise-redis:
        condition: service_healthy
      finwise-cosmosdb-emulator:
        condition: service_healthy

# Usage:
#   Full stack (local infra + server):  docker compose up -d
#   Infrastructure only:                docker compose -f docker-compose.infra.yml up -d
#   Server only (Azure DBs):            docker compose -f docker-compose.finwise.yml --env-file .env --env-file .env.azure up -d
#   Stop:                               docker compose down
#   Logs:                               docker compose logs -f
#   Status:                             docker compose ps
